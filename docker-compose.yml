version: "3.9"

networks:
  dokploy-network:
    external: true

services:
  front:
    container_name: admin-house-front
    image: eugenenumart/admin-house-front:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_FRONT_MODE: ${NEXT_FRONT_MODE}
      NEXT_PUBLIC_HOST_API: https://api.alibaba.hhos.ru/api/v1.0/
      NEXT_PUBLIC_ASSETS_API: ${NEXT_PUBLIC_ASSETS_API}
    expose:
      - 8080
    networks:
      - default
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin-house-front.rule=Host(`alibaba.hhos.ru`)"
      - "traefik.http.routers.admin-house-front.entrypoints=websecure"
      - "traefik.http.routers.admin-house-front.tls.certresolver=letsencrypt"
      - "traefik.http.services.admin-house-front.loadbalancer.server.port=8080"

  postgres:
    container_name: admin-house-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME} -d ${POSTGRES_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  back:
    container_name: admin-house-back
    image: eugenenumart/admin-house-back:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      STRICT_ADMIN_KEY: ${STRICT_ADMIN_KEY}
      APP_PORT: ${APP_PORT}
      API_PREFIX: ${API_PREFIX}
      API_VERSION: ${API_VERSION}
      JWT_KEY: ${JWT_KEY}
      KEY_SECRET_FOR_STRICT_ADMIN_KEY: ${KEY_SECRET_FOR_STRICT_ADMIN_KEY}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: s3-minio
      MINIO_PORT: ${MINIO_PORT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - 3000
    networks:
      - default
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin-house-back.rule=Host(`api.alibaba.hhos.ru`)"
      - "traefik.http.routers.admin-house-back.entrypoints=websecure"
      - "traefik.http.routers.admin-house-back.tls.certresolver=letsencrypt"
      - "traefik.http.services.admin-house-back.loadbalancer.server.port=3000"

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: admin-house-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_LISTEN_PORT: ${PGADMIN_PORT}
    expose:
      - 5050
    depends_on:
      - postgres

  redis:
    container_name: admin-house-redis
    image: redis:7.2.4-alpine
    restart: unless-stopped
    expose:
      - 6379

  redis-commander:
    container_name: admin-house-redis-commander
    hostname: redis-commander
    restart: unless-stopped
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379
    expose:
      - 8081

  s3-minio:
    container_name: admin-house-minio
    image: minio/minio
    restart: unless-stopped
    expose:
      - 9000
      - 9001
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server --console-address ":9001" /data

  minio-init:
    image: minio/mc
    depends_on:
      - s3-minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://s3-minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY};
      /usr/bin/mc mb --ignore-existing myminio/$${MINIO_BUCKET_NAME};
      /usr/bin/mc anonymous set public myminio/$${MINIO_BUCKET_NAME};
      exit 0;
      "
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
    restart: "no"

volumes:
  postgres-data:
  minio-data:
