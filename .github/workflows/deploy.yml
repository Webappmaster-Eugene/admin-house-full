# 3rd step: Trigger Dokploy to redeploy the compose stack.
# Replaces: SSH → git pull → docker compose up → prisma db push → prisma db seed
# Prisma is now handled by back container's docker-entrypoint.sh on startup.

name: Deploy
on:
  workflow_run:
    workflows: ["Build"]
    branches: [main]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy deployment
        run: |
          if [ -z "${{ secrets.DOKPLOY_WEBHOOK_URL }}" ]; then
            echo "::error::DOKPLOY_WEBHOOK_URL not set — production will NOT be updated"
            echo "Set the secret or trigger redeploy manually from the Dokploy dashboard"
            exit 1
          fi

          echo "Triggering Dokploy webhook..."
          ATTEMPTS=3
          for i in $(seq 1 "$ATTEMPTS"); do
            HTTP_CODE=$(curl -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}" \
              --silent --output /dev/stderr --write-out "%{http_code}" \
              --max-time 30) || HTTP_CODE="000"

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "Deployment triggered successfully! (HTTP $HTTP_CODE, attempt $i/$ATTEMPTS)"
              exit 0
            fi

            echo "::warning::Dokploy webhook returned HTTP $HTTP_CODE (attempt $i/$ATTEMPTS)"
            if [ "$i" -lt "$ATTEMPTS" ]; then
              sleep $((i * 5))
            fi
          done

          echo "::error::Dokploy webhook failed after $ATTEMPTS attempts (last HTTP $HTTP_CODE) — production was NOT updated. Check Dokploy dashboard."
          exit 1

  send-start-deploy-telegram-message:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Notify deployment started
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🏹 Deploy ${{ github.repository }} started
            commit: ${{ github.event.workflow_run.head_commit.message }}
            author: ${{ github.actor }}
            See: https://github.com/${{ github.repository }}/commit/${{ github.sha }}

  send-telegram-message:
    name: Notify deployment succeeded
    needs: [deploy]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ ${{ github.repository }} deployed successfully
            commit: ${{ github.sha }}
            author: ${{ github.actor }}
            See: https://github.com/${{ github.repository }}/commit/${{ github.sha }}

  notify-on-error:
    name: Notify deployment failed
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()
    steps:
      - uses: actions/checkout@v4
      - uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ ${{ github.repository }} deployment FAILED
            See: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
