# 2nd step: Build Docker images for front and back, push to Docker Hub.
# Images are tagged with both :latest and :<git-sha> for rollback capability.
# Docker layer cache is stored in a separate :buildcache tag on Docker Hub.

name: Build
on:
  workflow_run:
    workflows: ["Check"]
    branches: [main]
    types:
      - completed

jobs:
  build-backend:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./back
          file: ./back/Dockerfile.back
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/admin-house-back:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/admin-house-back:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/admin-house-back:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/admin-house-back:buildcache,mode=max

  build-frontend:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front
          file: ./front/Dockerfile.front
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/admin-house-front:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/admin-house-front:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/admin-house-front:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/admin-house-front:buildcache,mode=max
