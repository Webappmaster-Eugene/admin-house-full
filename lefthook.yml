pre-commit:
  parallel: true
  commands:
    front-lint:
      root: "front/"
      glob: "src/**/*.{ts,tsx}"
      run: npx eslint --fix {staged_files} && git add {staged_files}
    front-prettier:
      root: "front/"
      glob: "src/**/*.{ts,tsx}"
      run: npx prettier --write {staged_files} && git add {staged_files}
    back-lint:
      root: "back/"
      glob: "src/**/*.ts"
      run: npx eslint --fix {staged_files} && git add {staged_files}

pre-push:
  parallel: true
  commands:
    front-typecheck:
      root: "front/"
      run: npm run ts
    front-lint:
      root: "front/"
      run: npm run lint
    front-build:
      root: "front/"
      run: npm run build
    back-lint:
      root: "back/"
      run: npm run lint
    back-build:
      root: "back/"
      run: npm run build
